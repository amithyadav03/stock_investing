# ==============================================================================
# ALPHA AGENT — STRATEGY CONFIGURATION
# All parameters read at runtime — no code changes needed to tune strategy.
# ==============================================================================

# ── Capital ────────────────────────────────────────────────────────────────────
capital:
  paper_mode: true                      # true = simulation, false = live Kite orders
  paper_capital: 500000                 # ₹5L virtual capital
  live_capital: 500000                  # sync from Kite margins in live mode
  max_concurrent_positions: 5           # total across all strategies
  min_available_capital: 10000          # don't open new trade below this threshold

# ── Scheduled Reports (IST, 24-hr) ────────────────────────────────────────────
reports:
  morning_brief: "08:30"
  midday_checkin: "12:30"
  eod_summary: "17:00"

# ── Per-Strategy Configuration ────────────────────────────────────────────────
strategies:

  swing:
    enabled: true
    max_positions: 3                    # max simultaneous swing positions
    holding_days_min: 5
    holding_days_max: 30
    conviction_threshold: 65            # min 0-100 score to generate a proposal
    risk_per_trade: 0.01                # 1% of total capital per trade
    atr_sl_multiplier: 2.0
    min_rr_ratio: 1.5
    timeframes: [daily, weekly]

  positional:
    enabled: true
    max_positions: 2
    holding_days_min: 30
    holding_days_max: 180
    conviction_threshold: 72            # higher bar — longer commitment
    risk_per_trade: 0.01
    atr_sl_multiplier: 2.5
    min_rr_ratio: 2.0
    timeframes: [daily, weekly, monthly]

  value:
    enabled: false                      # auto-enables when capital >= min_capital_to_activate
    min_capital_to_activate: 200000     # ₹2L minimum
    max_positions: 2
    holding_days_min: 180
    holding_days_max: 1095              # 3 years
    conviction_threshold: 78
    risk_per_trade: 0.015
    atr_sl_multiplier: 3.0
    min_rr_ratio: 3.0
    timeframes: [weekly, monthly]

# ── Risk Guardrails (all strategies) ──────────────────────────────────────────
risk:
  conviction_multipliers:
    HIGH:   1.00
    MEDIUM: 0.75
    LOW:    0.50

  max_absolute_risk_per_trade: 0.02     # never risk >2% on any single trade
  max_portfolio_heat: 0.05              # total capital at risk across all open trades
  max_position_size_pct: 0.20           # single position ≤ 20% of portfolio

  max_liquidity_percent_of_volume: 0.01
  min_sl_atr_multiplier: 0.5

  max_daily_loss_pct: 0.02
  max_consecutive_losses: 3
  max_open_positions: 5
  max_drawdown_from_peak_pct: 0.15     # halt if equity drops 15% from all-time high
  max_positions_per_sector: 2           # prevent sector concentration
  transaction_cost_pct: 0.004          # 0.4% round-trip (STT + brokerage + fees)

# ── Exit Management ────────────────────────────────────────────────────────────
exit:
  monitor_interval_minutes: 10
  max_holding_days_swing: 30
  max_holding_days_positional: 180
  trail_sl_atr_trigger: 1.0
  emergency_exit_atr_multiplier: 3.0

# ── Scanning ──────────────────────────────────────────────────────────────────
scanning:
  interval_seconds: 2
  lookback_days: 700
  pre_screener_top_n: 20               # top N from screener sent to deep analysis
  fallback_symbols:
    - RELIANCE
    - HDFCBANK
    - INFY
    - TCS
    - ICICIBANK
    - TATAMOTORS
    - BAJFINANCE
    - SUNPHARMA
    - WIPRO
    - HCLTECH

# ── Order Execution ───────────────────────────────────────────────────────────
trading:
  order_variety: AMO
  product_type: CNC
  amo_cutoff_time: "09:00"             # IST — approve before this for same-day AMO

# ── News ──────────────────────────────────────────────────────────────────────
news:
  check_interval_minutes: 15
  rss_feeds:
    - "https://www.moneycontrol.com/rss/MCtopnews.xml"
    - "https://www.moneycontrol.com/rss/business.xml"
    - "https://economictimes.indiatimes.com/markets/rssfeeds/2146842.cms"
    - "https://www.livemint.com/rss/markets"
    - "https://www.business-standard.com/rss/markets-106.rss"

# ── Global Market Tickers (for morning brief) ─────────────────────────────────
global_indices:
  - {ticker: "^GSPC",    name: "S&P 500"}
  - {ticker: "^IXIC",    name: "NASDAQ"}
  - {ticker: "^N225",    name: "Nikkei 225"}
  - {ticker: "^HSI",     name: "Hang Seng"}
  - {ticker: "GC=F",     name: "Gold"}
  - {ticker: "CL=F",     name: "Crude Oil"}
  - {ticker: "USDINR=X", name: "USD/INR"}
  - {ticker: "^VIX",     name: "VIX"}
